<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الرواد - المستندات المؤمنة</title>
    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #2b6cb0;
            --accent-color: #3182ce;
            --bg-color: #f8f9fa;
            --border-color: #cbd5e1;
            --text-color: #2d3748;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary-color);
            margin-bottom: 30px;
        }

        h2 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 16px;
            color: var(--secondary-color);
            margin: 20px 0 15px 0;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 6px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #4a5568;
            font-size: 13px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 13px;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        .note-text {
            color: #c53030;
            font-size: 12px;
            font-weight: bold;
            margin-top: 5px;
        }

        button.btn-action {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
            transition: background 0.2s;
        }

        button.btn-action:hover {
            background-color: var(--secondary-color);
        }

        .table-responsive {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            min-width: 700px;
            border-collapse: collapse;
            background-color: #fff;
        }

        th, td {
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            text-align: center;
            vertical-align: middle;
            font-size: 13px;
        }

        th {
            background-color: #edf2f7;
            color: var(--primary-color);
        }

        .badge-client {
            background-color: #ebf8ff;
            color: #2b6cb0;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge-all {
            background-color: #c6f6d5;
            color: #22543d;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }

        .nav-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
        }

        .nav-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>إدارة مستندات العملاء (نظام الحماية والأمان)</h2>

    <form id="clientDocsForm" onsubmit="addClientDocs(event)">
        <div class="section-title">رفع وتصنيف مستندات العملاء</div>
        
        <div class="form-group">
            <label for="docType">نوع الملف / المستند:</label>
            <select id="docType" onchange="toggleClientSelection()" required>
                <option value="">اختر نوع الملف...</option>
                <option value="أساسي">ملفات أساسية (مخصصة لعميل معين)</option>
                <option value="عام">ملفات عامة (مرئية للجميع - للاطلاع فقط)</option>
            </select>
        </div>

        <div class="form-group" id="clientSelectionGroup" style="display: none;">
            <label for="selectedClient">اسم العميل:</label>
            <select id="selectedClient">
                <option value="">اختر العميل...</option>
                </select>
        </div>

        <div class="form-group">
            <label for="clientDocTitle">عنوان أو وصف الملفات:</label>
            <input type="text" id="clientDocTitle" placeholder="مثال: أوراق التأسيس أو الفحص الضريبي 2026" required>
        </div>

        <div class="form-group">
            <label for="clientFiles">اختر الملفات:</label>
            <input type="file" id="clientFiles" multiple required>
            <div class="note-text">⚠ تحذير: الملفات العامة مؤمنة ضد الطباعة والنسخ والتصوير.</div>
        </div>

        <button type="submit" class="btn-action">رفع وحفظ المستندات</button>
    </form>

    <div class="table-responsive">
        <table id="clientDocsTable">
            <thead>
                <tr>
                    <th>اسم العميل</th>
                    <th>نوع الملف</th>
                    <th>العنوان</th>
                    <th>الملفات المرفوعة</th>
                    <th>الصلاحية والظهور</th>
                    <th>التاريخ</th>
                    <th>الإجراء</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="7" style="color: #718096; padding: 20px;">لا توجد ملفات مرفوعة حالياً</td>
                </tr>
            </tbody>
        </table>
    </div>

    <a href="dashboard-all.html" class="nav-link">العودة للوحة التحكم الرئيسية 🏠</a>
</div>

<script>
    let clientDocs = [];

    document.addEventListener("DOMContentLoaded", function() {
        // جلب أسماء العملاء من الـ LocalStorage
        const savedClients = JSON.parse(localStorage.getItem('rowadClients')) || [];
        const clientSelect = document.getElementById('selectedClient');
        
        clientSelect.innerHTML = '<option value="">اختر العميل...</option>';
        savedClients.forEach(function(c) {
            const opt = document.createElement('option');
            opt.value = c.name;
            opt.textContent = c.name;
            clientSelect.appendChild(opt);
        });
        
        updateClientTable();
    });

    function toggleClientSelection() {
        const docType = document.getElementById('docType').value;
        const clientGroup = document.getElementById('clientSelectionGroup');
        const clientSelect = document.getElementById('selectedClient');

        if (docType === 'أساسي') {
            clientGroup.style.display = 'block';
            clientSelect.setAttribute('required', 'required');
        } else {
            clientGroup.style.display = 'none';
            clientSelect.removeAttribute('required');
            clientSelect.value = ''; // تصفية الاختيار
        }
    }

    function addClientDocs(event) {
        event.preventDefault();
        
        const docType = document.getElementById('docType').value;
        let clientName = "جميع العملاء";
        
        if (docType === 'أساسي') {
            clientName = document.getElementById('selectedClient').value;
        }

        const title = document.getElementById('clientDocTitle').value;
        const filesInput = document.getElementById('clientFiles');
        
        let fileNames = [];
        for (let i = 0; i < filesInput.files.length; i++) {
            fileNames.push(filesInput.files[i].name);
        }

        const newDoc = {
            client: clientName,
            type: docType,
            title: title,
            files: fileNames.join(', '),
            date: new Date().toLocaleDateString('ar-EG')
        };

        clientDocs.push(newDoc);
        updateClientTable();
        document.getElementById('clientDocsForm').reset();
        document.getElementById('clientSelectionGroup').style.display = 'none';
    }

    function updateClientTable() {
        const tbody = document.querySelector('#clientDocsTable tbody');
        tbody.innerHTML = '';
        
        if (clientDocs.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" style="color: #718096; padding: 20px;">لا توجد ملفات مرفوعة حالياً</td></tr>`;
            return;
        }
        
        clientDocs.forEach((doc, index) => {
            let visibilityBadge = '';
            
            if (doc.type === 'أساسي') {
                visibilityBadge = `<span class="badge-client">خاص بالعميل والمكتب</span>`;
            } else {
                visibilityBadge = `<span class="badge-all">مرئي للجميع (للاطلاع فقط)</span>`;
            }

            tbody.innerHTML += `
                <tr>
                    <td><strong>${doc.client}</strong></td>
                    <td>${doc.type}</td>
                    <td>${doc.title}</td>
                    <td>${doc.files}</td>
                    <td>${visibilityBadge}</td>
                    <td>${doc.date}</td>
                    <td><button onclick="this.closest('tr').remove()" style="background:#e53e3e; color:white; border:none; padding:3px 8px; border-radius:4px; cursor:pointer;">حذف</button></td>
                </tr>
            `;
        });
    }
</script>

</body>
</html>
