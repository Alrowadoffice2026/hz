<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الرواد - متابعة التزامات وتواريخ العملاء</title>
    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #2b6cb0;
            --accent-color: #3182ce;
            --bg-color: #f8f9fa;
            --border-color: #cbd5e1;
            --text-color: #2d3748;
            --danger-color: #c53030;
            --warning-color: #dd6b20;
            --success-color: #22543d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
            background-image: url('https://blogger.googleusercontent.com/img/a/AVvXsEh4hJ4vB-t6l_gq9_W3C_I7wT8oG_3gL_w8n1V_s5M0qK6U019F_fMv3h1W7771_0nL5P-4o9u0w8E0z6x9Z653p5W-3A_t2_1h4y6h0x6_6y8Y_7h3W_5x4P_6z4_m6t2_');
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            background-size: 350px;
            background-color: rgba(248, 249, 250, 0.95);
            background-blend-mode: overlay;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary-color);
            margin-bottom: 30px;
        }

        h2 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 16px;
            color: var(--secondary-color);
            margin: 20px 0 15px 0;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 6px;
            font-weight: 600;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 6px;
            font-weight: 600;
            color: #4a5568;
            font-size: 13px;
        }

        input, select, textarea {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 13px;
            width: 100%;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        .alert-box {
            background-color: #fff5f5;
            border: 1px solid #feb2b2;
            color: var(--danger-color);
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 15px;
            display: none;
            font-weight: bold;
        }

        button.btn-action {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            transition: background 0.2s;
        }

        button.btn-action:hover {
            background-color: var(--secondary-color);
        }

        .table-responsive {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            min-width: 1000px;
            border-collapse: collapse;
            background-color: #fff;
        }

        th, td {
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            text-align: center;
            vertical-align: middle;
            font-size: 12px;
        }

        th {
            background-color: #edf2f7;
            color: var(--primary-color);
        }

        .badge-danger {
            background-color: #fed7d7;
            color: var(--danger-color);
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .badge-warning {
            background-color: #feebc8;
            color: var(--warning-color);
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .badge-success {
            background-color: #c6f6d5;
            color: var(--success-color);
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .nav-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
        }

        .nav-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>شاشة متابعة التزامات العملاء - مكتب الرواد</h2>

    <div id="alertBox" class="alert-box"></div>

    <form id="clientFollowupForm" onsubmit="addRecord(event)">
        <div class="section-title">تسجيل بيانات العميل والتزاماته</div>
        
        <div class="form-grid">
            <div class="form-group">
                <label for="clientName">اسم العميل:</label>
                <select id="clientName" required>
                    <option value="">اختر العميل...</option>
                    <option value="شركة الرواد للتجارة والصناعة">شركة الرواد للتجارة والصناعة</option>
                    <option value="شركة أسبريكس لقطع الغيار">شركة أسبريكس لقطع الغيار</option>
                    <option value="شركة البيان الحديث">شركة البيان الحديث</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="legalEntity">الكيان القانونى:</label>
                <input type="text" id="legalEntity" placeholder="اكتب الكيان القانوني هنا" required>
            </div>

            <div class="form-group">
                <label for="foundingDate">تاريخ التأسيس:</label>
                <input type="date" id="foundingDate" required>
            </div>

            <div class="form-group">
                <label for="taxNumber">رقم التسجيل الضريبي:</label>
                <input type="text" id="taxNumber" placeholder="رقم التسجيل الضريبي" required>
            </div>

            <div class="form-group">
                <label for="address">عنوان الشركة:</label>
                <input type="text" id="address" placeholder="عنوان الشركة" required>
            </div>

            <div class="form-group">
                <label for="taxOffice">المأمورية التابعة:</label>
                <input type="text" id="taxOffice" placeholder="المأمورية" required>
            </div>

            <div class="form-group">
                <label for="activityCode">كود النشاط:</label>
                <input type="text" id="activityCode" placeholder="كود النشاط" required>
            </div>
        </div>

        <div class="section-title">تواريخ انتهاء التراخيص والبطاقات</div>
        <div class="form-grid">
            <div class="form-group">
                <label for="taxCardExpiry">تاريخ انتهاء البطاقة الضريبية:</label>
                <input type="date" id="taxCardExpiry" required>
            </div>
            <div class="form-group">
                <label for="commercialExpiry">تاريخ انتهاء السجل التجاري:</label>
                <input type="date" id="commercialExpiry" required>
            </div>
            <div class="form-group">
                <label for="exportExpiry">تاريخ انتهاء البطاقة التصديرية:</label>
                <input type="date" id="exportExpiry" required>
            </div>
            <div class="form-group">
                <label for="importExpiry">تاريخ انتهاء البطاقة الاستيرادية:</label>
                <input type="date" id="importExpiry" required>
            </div>
        </div>

        <div class="section-title">الالتزامات الضريبية</div>
        <div class="form-grid">
            <div class="form-group">
                <label for="obligationPeriod">دورية الالتزام:</label>
                <select id="obligationPeriod" required>
                    <option value="شهري">التزام شهري</option>
                    <option value="ربع سنوي">التزام ربع سنوي</option>
                    <option value="سنوي">التزام سنوي</option>
                </select>
            </div>
            <div class="form-group">
                <label for="obligationType">نوع الالتزام الضريبي:</label>
                <select id="obligationType" required>
                    <option value="قيمة مضافة">قيمة مضافة</option>
                    <option value="نموذج 41">نموذج 41</option>
                    <option value="نموذج سداد شهري">نموذج سداد شهري</option>
                    <option value="نموذج 6 مرتبات">نموذج 6 مرتبات</option>
                    <option value="إقرار سنوي">إقرار سنوي</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn-action">حفظ بيانات ومتابعة العميل</button>
    </form>

    <div class="table-responsive">
        <table id="followupTable">
            <thead>
                <tr>
                    <th>اسم العميل</th>
                    <th>الكيان القانوني</th>
                    <th>رقم التسجيل</th>
                    <th>الضرائب والمأمورية</th>
                    <th>كود النشاط</th>
                    <th>صلاحية التراخيص</th>
                    <th>دورية ونوع الالتزام</th>
                    <th>الإجراءات</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="8" style="color: #718096; padding: 20px;">لا توجد بيانات مسجلة حالياً</td>
                </tr>
            </tbody>
        </table>
    </div>

    <a href="admin-dashboard.html" class="nav-link">العودة للوحة التحكم الرئيسية</a>
</div>

<script>
    let clientRecords = [];

    function addRecord(event) {
        event.preventDefault();
        
        const record = {
            clientName: document.getElementById('clientName').value,
            legalEntity: document.getElementById('legalEntity').value,
            foundingDate: document.getElementById('foundingDate').value,
            taxNumber: document.getElementById('taxNumber').value,
            address: document.getElementById('address').value,
            taxOffice: document.getElementById('taxOffice').value,
            activityCode: document.getElementById('activityCode').value,
            taxCardExpiry: document.getElementById('taxCardExpiry').value,
            commercialExpiry: document.getElementById('commercialExpiry').value,
            exportExpiry: document.getElementById('exportExpiry').value,
            importExpiry: document.getElementById('importExpiry').value,
            obligationPeriod: document.getElementById('obligationPeriod').value,
            obligationType: document.getElementById('obligationType').value
        };

        clientRecords.push(record);
        updateTable();
        document.getElementById('clientFollowupForm').reset();
        checkExpirations(record);
    }

    function checkExpirations(record) {
        const today = new Date();
        const alertBox = document.getElementById('alertBox');
        let warnings = [];

        const items = [
            { label: 'البطاقة الضريبية', date: record.taxCardExpiry },
            { label: 'السجل التجاري', date: record.commercialExpiry },
            { label: 'البطاقة التصديرية', date: record.exportExpiry },
            { label: 'البطاقة الاستيرادية', date: record.importExpiry }
        ];

        items.forEach(item => {
            const expDate = new Date(item.date);
            const diffTime = expDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays <= 10 && diffDays >= 0) {
                warnings.push(`تنبيه: ${item.label} الخاصة بالعميل "${record.clientName}" ستنتهي خلال ${diffDays} أيام.`);
            } else if (diffDays < 0) {
                warnings.push(`تنبيه: ${item.label} الخاصة بالعميل "${record.clientName}" منتهية الصلاحية.`);
            }
        });

        if (warnings.length > 0) {
            alertBox.innerHTML = warnings.join('<br>');
            alertBox.style.display = 'block';
        } else {
            alertBox.style.display = 'none';
        }
    }

    function updateTable() {
        const tbody = document.querySelector('#followupTable tbody');
        tbody.innerHTML = '';

        if (clientRecords.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" style="color: #718096; padding: 20px;">لا توجد بيانات مسجلة حالياً</td></tr>`;
            return;
        }

        clientRecords.forEach((r, index) => {
            tbody.innerHTML += `
                <tr>
                    <td><strong>${r.clientName}</strong></td>
                    <td>${r.legalEntity}</td>
                    <td>${r.taxNumber}</td>
                    <td>${r.taxOffice}<br><span style="font-size:10px; color:#555">${r.address}</span></td>
                    <td>${r.activityCode}</td>
                    <td style="text-align:right;">
                        • ضريبية: ${r.taxCardExpiry}<br>
                        • تجاري: ${r.commercialExpiry}<br>
                        • تصديرية: ${r.exportExpiry}<br>
                        • استيرادية: ${r.importExpiry}
                    </td>
                    <td>
                        <span class="badge-success">${r.obligationPeriod}</span>
                        <br>
                        ${r.obligationType}
                    </td>
                    <td>
                        <button onclick="alert('تم تجهيز التقرير الضريبي الخاص بالعميل')" style="background:none; border:none; color:var(--accent-color); cursor:pointer; font-weight:bold;">إصدار تقرير</button>
                    </td>
                </tr>
            `;
        });
    }
</script>

</body>
</html>
