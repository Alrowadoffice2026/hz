<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الرواد - متابعة التزامات وتواريخ العملاء</title>
    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #2b6cb0;
            --accent-color: #3182ce;
            --bg-color: #f8f9fa;
            --border-color: #cbd5e1;
            --text-color: #2d3748;
            --danger-color: #c53030;
            --warning-color: #dd6b20;
            --success-color: #22543d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 4px solid var(--primary-color);
        }

        h2 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 25px;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 220px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 13px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 13px;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        .btn-action {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-action:hover {
            background-color: var(--secondary-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            text-align: center;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 10px;
            font-size: 13px;
        }

        th {
            background-color: #edf2f7;
            color: var(--primary-color);
        }

        .nav-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>متابعة التزامات وتواريخ العملاء</h2>

    <div class="form-row">
        <div class="form-group">
            <label for="clientNameSelect">اسم العميل:</label>
            <select id="clientNameSelect" required>
                <option value="">اختر العميل المسجل...</option>
                </select>
        </div>
        <div class="form-group">
            <label for="legalEntity">الكيان القانوني:</label>
            <input type="text" id="legalEntity" placeholder="شركة فردية، ذات مسؤولية محدودة...">
        </div>
        <div class="form-group">
            <label for="foundingDate">تاريخ التأسيس:</label>
            <input type="date" id="foundingDate">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="taxNumber">رقم التسجيل الضريبي:</label>
            <input type="text" id="taxNumber" placeholder="xxx-xxx-xxx">
        </div>
        <div class="form-group">
            <label for="taxOffice">المأمورية الضريبية:</label>
            <input type="text" id="taxOffice" placeholder="مثال: الاستثمار / المهن الحرة">
        </div>
        <div class="form-group">
            <label for="activityCode">كود النشاط:</label>
            <input type="text" id="activityCode" placeholder="مثال: 45001">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="taxCardExpiry">انتهاء البطاقة الضريبية:</label>
            <input type="date" id="taxCardExpiry">
        </div>
        <div class="form-group">
            <label for="commercialExpiry">انتهاء السجل التجاري:</label>
            <input type="date" id="commercialExpiry">
        </div>
        <div class="form-group">
            <label for="obligationType">نوع الالتزام:</label>
            <select id="obligationType">
                <option value="إقرار شهري">إقرار شهري (قيمة مضافة)</option>
                <option value="إقرار سنوي">إقرار سنوي (أرباح تجارية وصناعية)</option>
                <option value="تأمين اجتماعي">تأمين اجتماعي / رواتب</option>
            </select>
        </div>
    </div>

    <button class="btn-action" onclick="addObligation()">إضافة التزام جديد</button>

    <table>
        <thead>
            <tr>
                <th>اسم العميل</th>
                <th>الكيان</th>
                <th>رقم الضريبي</th>
                <th>انتهاء السجل</th>
                <th>الالتزام</th>
                <th>الإجراء</th>
            </tr>
        </thead>
        <tbody id="followupTableBody">
            <tr>
                <td colspan="6" style="color: #a0aec0;">لا توجد التزامات مسجلة حالياً</td>
            </tr>
        </tbody>
    </table>

    <a href="dashboard-all.html" class="nav-link">العودة للوحة التحكم الرئيسية 🏠</a>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // جلب أسماء العملاء من الـ LocalStorage
        const savedClients = JSON.parse(localStorage.getItem('rowadClients')) || [];
        const selectElement = document.getElementById('clientNameSelect');
        
        selectElement.innerHTML = '<option value="">اختر العميل المسجل...</option>';
        savedClients.forEach(function(c) {
            const opt = document.createElement('option');
            opt.value = c.name;
            opt.textContent = c.name;
            selectElement.appendChild(opt);
        });
    });

    function addObligation() {
        const clientSelect = document.getElementById('clientNameSelect');
        const clientName = clientSelect.value;
        const legalEntity = document.getElementById('legalEntity').value;
        const taxNumber = document.getElementById('taxNumber').value;
        const commercialExpiry = document.getElementById('commercialExpiry').value;
        const obligationType = document.getElementById('obligationType').value;

        if (!clientName) {
            alert('يرجى اختيار العميل من القائمة أولاً.');
            return;
        }

        const tableBody = document.getElementById('followupTableBody');
        
        // إذا كان الجدول فارغاً، نحذف الرسالة
        if (tableBody.querySelector('td[colspan="6"]')) {
            tableBody.innerHTML = '';
        }

        const newRow = document.createElement('tr');
        newRow.innerHTML = `
            <td><strong>${clientName}</strong></td>
            <td>${legalEntity || 'غير محدد'}</td>
            <td>${taxNumber || 'غير محدد'}</td>
            <td>${commercialExpiry || 'غير محدد'}</td>
            <td>${obligationType}</td>
            <td><button onclick="this.closest('tr').remove()" style="background:#e53e3e; color:white; border:none; padding:3px 8px; border-radius:4px; cursor:pointer;">حذف</button></td>
        `;
        
        tableBody.appendChild(newRow);
        alert('تم إضافة التزام جديد بنجاح!');
        
        // إعادة تعيين الفورم
        document.getElementById('legalEntity').value = '';
        document.getElementById('taxNumber').value = '';
        document.getElementById('commercialExpiry').value = '';
        clientSelect.value = '';
    }
</script>

</body>
</html>
