<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المكتب - مكتب الرواد</title>
    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #2b6cb0;
            --bg-color: #f8f9fa;
            --text-color: #2d3748;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 4px solid var(--primary-color);
        }

        h2 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 30px;
        }

        .stats-row {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            flex: 1;
            background: #edf2f7;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border-right: 4px solid var(--secondary-color);
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
        }

        /* تنسيق زر الإضافة السريعة */
        .add-client-card {
            background: #edf2f7;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }

        .add-client-card h3 {
            margin-top: 0;
            color: var(--primary-color);
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            text-align: center;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 12px;
            font-size: 14px;
        }

        th {
            background-color: #edf2f7;
            color: var(--primary-color);
        }

        .btn-action {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-action:hover {
            background-color: var(--primary-color);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>شاشة مراجعة المكتب - مكتب الرواد</h2>

    <div class="stats-row">
        <div class="stat-card">
            <div>الشركات المسجلة</div>
            <div class="stat-number">12</div>
        </div>
        <div class="stat-card">
            <div>الطلبات المعلقة</div>
            <div class="stat-number">1</div>
        </div>
    </div>

    <div class="add-client-card">
        <h3>تسجيل عميل جديد وتوليد بيانات الدخول</h3>
        <div class="form-row">
            <div class="form-group">
                <label for="clientName">اسم المؤسس / العميل:</label>
                <input type="text" id="clientName" placeholder="أدخل اسم العميل" required>
            </div>
            <div class="form-group">
                <label for="clientPhone">رقم الهاتف:</label>
                <input type="tel" id="clientPhone" placeholder="01xxxxxxxxx" required>
            </div>
            <div class="form-group">
                <label for="clientUsername">اسم المستخدم (البريد الإلكتروني):</label>
                <input type="email" id="clientUsername" placeholder="email@company.com" required>
            </div>
            <div class="form-group">
                <label for="clientPassword">كلمة المرور المؤقتة:</label>
                <input type="text" id="clientPassword" value="Rowad@2026" required>
            </div>
        </div>
        <button class="btn-action" onclick="addAndGenerate()">إضافة وتوليد بيانات الدخول</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>اسم العميل</th>
                <th>رقم الهاتف</th>
                <th>اسم المستخدم</th>
                <th>التاريخ</th>
                <th>الإجراءات</th>
            </tr>
        </thead>
        <tbody id="clientsTableBody">
            <tr>
                <td>أحمد محمد</td>
                <td>01234567890</td>
                <td>ahmed@rowad.com</td>
                <td>2026-05-01</td>
                <td>
                    <button class="btn-action" onclick="alert('تم نسخ البيانات أو إرسالها للعميل.')">إرسال</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    function addAndGenerate() {
        const name = document.getElementById('clientName').value;
        const phone = document.getElementById('clientPhone').value;
        const username = document.getElementById('clientUsername').value;
        
        if (!name || !phone || !username) {
            alert('يرجى ملء جميع الحقول المطلوبة.');
            return;
        }

        const tableBody = document.getElementById('clientsTableBody');
        const newRow = document.createElement('tr');
        
        newRow.innerHTML = `
            <td>${name}</td>
            <td>${phone}</td>
            <td>${username}</td>
            <td>${new Date().toISOString().split('T')[0]}</td>
            <td>
                <button class="btn-action" onclick="alert('تم إرسال بيانات الدخول للعميل.')">إرسال</button>
            </td>
        `;
        
        tableBody.appendChild(newRow);
        
        alert('تم إضافة العميل وتوليد بيانات الدخول بنجاح!');
        
        // إعادة تعيين الحقول
        document.getElementById('clientName').value = '';
        document.getElementById('clientPhone').value = '';
        document.getElementById('clientUsername').value = '';
    }
</script>

</body>
</html>
