<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة مكتب الرواد للخدمات المحاسبية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #1a202c;
        }
        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border-top: 4px solid #1a365d;
        }
        h2 { color: #1a365d; margin-top: 0; }
        p { color: #4a5568; font-size: 14px; margin-bottom: 25px; line-height: 1.6; }
        .btn {
            background-color: #2b6cb0;
            color: #ffffff;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
            margin-bottom: 10px;
            width: 80%;
        }
        .btn:hover { background-color: #1a365d; }
    </style>
</head>
<body>
    <div class="card">
        <h2>أهلاً بك في منصة مكتب الرواد</h2>
        <p>نظام الحماية والأمان المخصص للعملاء والإدارة.</p>
        
        <a href="client-panel.html" class="btn">بوابة العميل 🔒</a>
        <a href="dashboard-all.html" class="btn" style="background-color: #1a365d;">لوحة تحكم المكتب 📊</a>
    </div>
</body>
</html>
